                document.getElementById('feedback-step1').style.display = 'none';
                document.getElementById('feedback-screenshot').style.display = 'block';

                feedbackCanvas = document.getElementById('feedback-canvas');
                feedbackCanvas.width = canvas.width;
                feedbackCanvas.height = canvas.height;
                feedbackCtx = feedbackCanvas.getContext('2d');
                feedbackCtx.drawImage(canvas, 0, 0);

                screenshotData = canvas.toDataURL('image/png');

                setupDrawing();
            } catch (err) {
                console.error('Screenshot failed:', err);
                document.getElementById('feedback-modal').style.display = 'flex';
                showStatus('截圖失敗，請直接輸入意見', 'error');
            }
        }

        function setupDrawing() {
            let lastX, lastY;

            feedbackCanvas.onmousedown = (e) => {
                isDrawing = true;
                const rect = feedbackCanvas.getBoundingClientRect();
                const scaleX = feedbackCanvas.width / rect.width;
                const scaleY = feedbackCanvas.height / rect.height;
                lastX = (e.clientX - rect.left) * scaleX;
                lastY = (e.clientY - rect.top) * scaleY;
            };

            feedbackCanvas.onmousemove = (e) => {
                if (!isDrawing) return;
                const rect = feedbackCanvas.getBoundingClientRect();
                const scaleX = feedbackCanvas.width / rect.width;
                const scaleY = feedbackCanvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;

                feedbackCtx.beginPath();
                feedbackCtx.moveTo(lastX, lastY);
                feedbackCtx.lineTo(x, y);
                feedbackCtx.strokeStyle = '#ff0000';
                feedbackCtx.lineWidth = 4;
                feedbackCtx.lineCap = 'round';
                feedbackCtx.stroke();

                lastX = x;
                lastY = y;
            };

            feedbackCanvas.onmouseup = () => isDrawing = false;
            feedbackCanvas.onmouseleave = () => isDrawing = false;
        }

        function clearDrawing() {
            if (screenshotData) {
                const img = new Image();
                img.onload = () => {
                    feedbackCtx.clearRect(0, 0, feedbackCanvas.width, feedbackCanvas.height);
                    feedbackCtx.drawImage(img, 0, 0);
                };
                img.src = screenshotData;
            }
        }

        function retakeScreenshot() {
            captureScreen();
        }

        function showStatus(message, type) {
            const status = document.getElementById('feedback-status');
            status.style.display = 'block';
            status.textContent = message;
            status.style.background = type === 'error' ? '#fee2e2' : type === 'success' ? '#d1fae5' : '#e0e7ff';
            status.style.color = type === 'error' ? '#dc2626' : type === 'success' ? '#059669' : '#4338ca';
        }

        async function submitFeedback(withSponsor) {
            const message = document.getElementById('feedback-message').value.trim();

            if (!message) {
                showStatus('請輸入意見內容', 'error');
                return;
            }

            showStatus('正在送出...', 'info');

            const finalScreenshot = feedbackCanvas ? feedbackCanvas.toDataURL('image/png') : null;

            try {
                const response = await fetch(FEEDBACK_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        screenshot: finalScreenshot,
                        message: message,
                        url: window.location.href
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showStatus('感謝您的意見！已成功送出', 'success');

                    if (withSponsor) {
                        setTimeout(() => {
                            window.open('https://ko-fi.com/lightchang', '_blank');
                            closeFeedback();
                        }, 1000);
                    } else {
                        setTimeout(closeFeedback, 2000);
                    }
                } else {
                    showStatus(result.error || '送出失敗，請稍後再試', 'error');
                }
            } catch (err) {
                console.error('Submit failed:', err);
                showStatus('網路錯誤，請稍後再試', 'error');
            }
        }

        document.getElementById('feedback-modal').onclick = (e) => {
            if (e.target.id === 'feedback-modal') closeFeedback();
        };
    </script>
</body>
</html>
